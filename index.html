<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Relatórios - Elétrica Pesada</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <div class="main-container">
        <header>
            <h1>Elétrica Pesada</h1>
            <p>Relatório de Manutenção</p>
        </header>

        <section class="form-section">
            <div class="input-group">
                <label for="placa">Placa ou Prefixo da Máquina</label>
                <input type="text" id="placa" placeholder="Ex: ABC-1234 / Trator Case 220">
            </div>

            <div class="input-group">
                <label for="servico">Descrição do Serviço Realizado</label>
                <textarea id="servico" rows="4" placeholder="O que foi feito no veículo?"></textarea>
            </div>

            <div class="input-group">
                <label for="pecas">Peças e Materiais</label>
                <textarea id="pecas" rows="3" placeholder="Quais peças foram trocadas?"></textarea>
            </div>

            <div class="input-group">
                <label for="notas">Observações / Notas Adicionais</label>
                <textarea id="notas" rows="2" placeholder="Algo específico para a empresa saber?"></textarea>
            </div>

            <div class="actions">
                <button class="btn-save" onclick="salvarRelatorio()">💾 Salvar no Histórico</button>
                <button class="btn-pdf" onclick="gerarPDF()">📄 Gerar PDF do Serviço</button>
            </div>
        </section>

        <hr>

        <section class="history-section">
            <h2>Últimos Serviços Registrados</h2>
            <div id="lista-historico">
                <p class="empty-msg">Nenhum registro encontrado.</p>
            </div>
        </section>
    </div>

    <script>
        function salvarRelatorio() {
            const relatorio = {
                placa: document.getElementById('placa').value,
                servico: document.getElementById('servico').value,
                pecas: document.getElementById('pecas').value,
                notas: document.getElementById('notas').value,
                data: new Date().toLocaleString('pt-BR')
            };

            if(!relatorio.placa) {
                alert("Por favor, preencha pelo menos a placa ou prefixo.");
                return;
            }

            let banco = JSON.parse(localStorage.getItem('servicos_eletrica') || "[]");
            banco.unshift(relatorio);
            localStorage.setItem('servicos_eletrica', JSON.stringify(banco));
            
            alert("Relatório salvo com sucesso!");
            renderizarHistorico();
            limparCampos();
        }

        function renderizarHistorico() {
            const container = document.getElementById('lista-historico');
            let banco = JSON.parse(localStorage.getItem('servicos_eletrica') || "[]");
            
            if(banco.length === 0) return;

            container.innerHTML = banco.slice(0, 10).map(item => `
                <div class="card-historico">
                    <strong>${item.placa}</strong>
                    <span>Data: ${item.data}</span>
                    <p>${item.servico.substring(0, 60)}...</p>
                </div>
            `).join('');
        }

        function limparCampos() {
            document.getElementById('placa').value = '';
            document.getElementById('servico').value = '';
            document.getElementById('pecas').value = '';
            document.getElementById('notas').value = '';
        }

        async function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let banco = JSON.parse(localStorage.getItem('servicos_eletrica') || "[]");
            
            if(banco.length === 0) {
                alert("Salve um relatório primeiro para gerar o PDF.");
                return;
            }
            
            const ultimo = banco[0];
            doc.setFont("helvetica", "bold");
            doc.text("RELATÓRIO DE SERVIÇO ELÉTRICO", 20, 20);
            doc.setFont("helvetica", "normal");
            doc.text(`Data: ${ultimo.data}`, 20, 35);
            doc.text(`Veículo/Máquina: ${ultimo.placa}`, 20, 45);
            doc.text(`Descrição: ${ultimo.servico}`, 20, 55, { maxWidth: 170 });
            doc.text(`Peças: ${ultimo.pecas}`, 20, 85, { maxWidth: 170 });
            doc.text(`Notas: ${ultimo.notas}`, 20, 110, { maxWidth: 170 });
            
            doc.save(`Servico_${ultimo.placa.replace(/ /g, "_")}.pdf`);
        }

        renderizarHistorico();
    </script>
</body>
</html>
