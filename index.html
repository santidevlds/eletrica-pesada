<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Elétrica Pesada</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="icon" type="image/png" sizes="16x16" href="icons8-raio-emoji-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons8-raio-emoji-32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icons8-raio-emoji-96.png">
    
    <link rel="apple-touch-icon" sizes="57x57" href="icons8-raio-emoji-57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="icons8-raio-emoji-60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="icons8-raio-emoji-72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="icons8-raio-emoji-76.png">

    <meta property="og:title" content="Sistema Elétrica Pesada">
    <meta property="og:description" content="Seu app de Relatórios de Manutenção para linha pesada na palma da mão.">
    <meta property="og:type" content="website">
    
    <meta property="og:image" content="https://eletrica-pesada.vercel.app/og-image-eletrica-pesada.jpg">
</head>
<body class="dark-theme" id="body">

    <main class="main-container">
        <header>
            <div class="header-top">
                <div class="logo">
                    <i data-lucide="zap" class="icon-accent"></i>
                    <h1>Elétrica Pesada</h1>
                </div>
                <div class="header-actions">
                    <button id="btnTheme" class="btn-theme" aria-label="Mudar tema">
                        <i data-lucide="sun"></i>
                    </button>
                    <button id="btnLogout" class="btn-theme" aria-label="Sair">
                        <i data-lucide="log-out"></i>
                    </button>
                </div>
            </div>
            <p class="subtitle">Relatório de Manutenção</p>
        </header>

        <section class="form-section">
            <input type="hidden" id="edit-id">

            <div class="input-group">
                <label for="placa"><i data-lucide="truck"></i> Placa ou Prefixo</label>
                <input type="text" id="placa" placeholder="Ex: ABC-1234 / Trator 7500">
            </div>

            <div class="input-group">
                <label for="servico"><i data-lucide="wrench"></i> Serviço Realizado</label>
                <textarea id="servico" rows="3" placeholder="Descreva o que foi consertado..."></textarea>
            </div>

            <div class="input-group">
                <label for="pecas"><i data-lucide="package"></i> Peças Utilizadas</label>
                <textarea id="pecas" rows="2" placeholder="Ex: 1x Alternador 24v, 2m cabo 10mm"></textarea>
            </div>

            <div class="input-group">
                <label for="notas"><i data-lucide="sticky-note"></i> Notas Específicas</label>
                <textarea id="notas" rows="2" placeholder="Observações para a empresa..."></textarea>
            </div>

            <div class="actions">
                <button id="btnSave" class="btn-save">
                    <i data-lucide="save"></i> <span>Salvar Relatório</span>
                </button>
                <button id="btnCancelEdit" class="btn-pdf" style="display: none;">
                    <i data-lucide="x"></i> Cancelar Edição
                </button>
            </div>
        </section>

        <section class="history-section">
            <div class="history-header">
                <h2><i data-lucide="history"></i> Histórico Recente</h2>
                <button id="btnRefresh" class="btn-refresh" title="Atualizar lista">
                    <i data-lucide="refresh-cw"></i>
                </button>
            </div>

            <div class="filters-container">
                <div class="filter-group">
                    <i data-lucide="search"></i>
                    <input type="text" id="searchPlaca" placeholder="Buscar placa...">
                </div>
                <div class="filter-group">
                    <input type="date" id="filterData" title="Filtrar por data">
                </div>
                <button id="btnClearFilters" class="btn-clear" title="Limpar Filtros">
                    <i data-lucide="x-circle"></i>
                </button>
            </div>

            <div class="bulk-actions-wrapper">
                <div id="bulkActions" class="bulk-actions">
                    <label class="select-all-wrap" title="Selecionar Todos">
                        <input type="checkbox" id="checkSelectAll" class="card-checkbox">
                        <span id="selectedCount">0 selecionados</span>
                    </label>
                    
                    <div id="bulkButtons" class="bulk-buttons">
                        <button id="btnBulkEdit" title="Editar (Apenas 1)"><i data-lucide="edit"></i> Editar</button>
                        <button id="btnBulkPdf" title="Gerar PDF"><i data-lucide="file-down"></i> PDF</button>
                        <button id="btnBulkDelete" class="btn-danger" title="Excluir"><i data-lucide="trash-2"></i> Excluir</button>
                    </div>
                </div>
            </div>
            
            <div id="lista-historico" class="lista-historico">
                <p class="loading-text">Carregando dados do servidor...</p>
            </div>
        </section>
    </main>

    <div id="customModal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h3 id="modalTitle">Título</h3>
            <p id="modalMessage">Mensagem do modal aqui.</p>
            <div class="modal-buttons">
                <button id="modalBtnCancel" class="btn-pdf">Cancelar</button>
                <button id="modalBtnConfirm" class="btn-save">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
